<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Browser Viewer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <div class="status-bar">
        <span class="status" id="status">🟡 Connecting...</span>
        <span class="badge">Polling every 3s</span>
        <div class="link-display">🔗 <a id="linkDisplay" href="#" target="_blank">—</a></div>
        <button id="copyLinkBtn">📋 Copy Link</button>
        <button id="refreshBtn">🔄 Refresh</button>
    </div>

    <div class="screenshot-area">
        <img id="screenshot" alt="Remote browser view" title="Left click = click | Right click = right-click + copy link/text">
    </div>

    <!-- NEW: URL bar -->
    <div class="toolbar">
        <input type="text" id="urlInput" placeholder="Enter URL (e.g., example.com or https://...)" style="flex: 2;">
        <button id="goBtn">🌐 Go</button>
    </div>

    <div class="toolbar">
        <input type="text" id="typeText" placeholder="Type something...">
        <button id="typeBtn">⌨️ Type</button>
        <button id="enterBtn">⏎ Enter</button>
        <button id="scrollUpBtn">⬆ Scroll Up</button>
        <button id="scrollDownBtn">⬇ Scroll Down</button>
        <button id="copyRemoteClipboardBtn">📋 Get Remote Clipboard</button>
        <button id="setRemoteClipboardBtn">📤 Set Remote Clipboard</button>
        <button id="stopBrowserBtn" class="danger">⏹️ Stop Remote Browser</button>
    </div>

    <div class="toolbar">
        <span>Manual command (JSON):</span>
        <textarea id="manualCommand" placeholder='{"action":"goto","url":"https://example.com"}'></textarea>
        <button id="sendManualBtn">📡 Send</button>
    </div>

    <div class="log" id="log">
        📡 Ready. Click on screenshot to click remotely. Right-click to copy link/text.
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
