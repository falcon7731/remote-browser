name: 🌐 Persistent Remote Browser

on:
  workflow_dispatch:
    inputs:
      session_hours:
        description: 'Hours to run (max 6)'
        required: false
        default: '6'

permissions:
  contents: write

jobs:
  browse:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: session
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Configure git
        run: |
          git config --global user.email "runner@github-actions"
          git config --global user.name "GitHub Actions"

      - name: Run persistent browser
        run: python persistent_runner.py
        env:
          SESSION_HOURS: ${{ github.event.inputs.session_hours }}